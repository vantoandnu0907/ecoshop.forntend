<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoShop - Chi tiết sản phẩm</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
  body{ background:#f5f6f8; font-family:"Segoe UI",Arial,sans-serif; }
  .navbar{ background:#2e7d32; }
  .navbar-brand{ color:#fff!important; font-size:24px; font-weight:bold; }
  .product-card{ background:#fff; border-radius:20px; padding:30px; box-shadow:0 10px 25px rgba(0,0,0,.08); }
  .main-image{ width:100%; height:420px; object-fit:cover; border-radius:15px; }
  .price{ color:#2e7d32; font-size:34px; font-weight:bold; }
  .old-price{ color:#888; text-decoration:line-through; font-size:18px; }
  .rating{ color:#ffc107; }
  .qty-btn{ width:42px; }
  .feature{ background:#f7fff8; border-radius:12px; padding:15px; margin-top:20px; }
  .feature p{ margin-bottom:8px; }
  .tab-pane{ background:#fff; border-radius:15px; padding:25px; box-shadow:0 5px 15px rgba(0,0,0,.08); }
  .related-card img{ height:180px; object-fit:cover; }
  footer{ background:#2e7d32; color:#fff; padding:25px; margin-top:60px; text-align:center; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">🌿 EcoShop</a>
    <a href="cart.html" class="btn btn-light">
      <i class="fa-solid fa-cart-shopping"></i> Giỏ hàng (<span id="cart-count">0</span>)
    </a>
  </div>
</nav>

<div class="container my-4">
  <a href="index.html" class="btn btn-outline-success mb-4"><i class="fa-solid fa-arrow-left"></i> Quay lại</a>

  <div id="product-container">
    <!-- Nội dung sản phẩm được render bằng JS bên dưới -->
  </div>
</div>

<footer>🌿 <strong>EcoShop</strong> — Nông sản sạch, minh bạch nguồn gốc.</footer>

<script src="app.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const productId = Number(urlParams.get("id"));
  const product = findProduct(productId);

  if(!product){
    document.getElementById("product-container").innerHTML = `
      <div class="text-center py-5">
        <h2>❌ Không tìm thấy sản phẩm</h2>
        <a href="index.html" class="btn btn-success mt-3">Quay về Trang chủ</a>
      </div>`;
  }else{
    renderProduct();
  }

  function renderProduct(){
    const container = document.getElementById("product-container");
    container.innerHTML = `
      <div class="product-card mb-4">
        <div class="row g-4">
          <div class="col-lg-6">
            <img id="mainImage" class="main-image" src="${product.image}" alt="${product.name}">
          </div>
          <div class="col-lg-6">
            <span class="badge bg-success">🌱 ${product.cert}</span>
            <h2 class="mt-3">${product.name}</h2>
            <div class="mb-2">
              <span class="rating">${"★".repeat(Math.round(product.rating||5))}${"☆".repeat(5-Math.round(product.rating||5))}</span>
              ${product.rating || 5} <small class="text-muted">· Mã SP: ${product.code || "—"}</small>
            </div>
            <div>
              ${product.oldPrice ? `<span class="old-price">${formatMoney(product.oldPrice)}</span> <span class="badge bg-danger">-${Math.round(100 - (product.price/product.oldPrice*100))}%</span>` : ""}
            </div>
            <div class="price">${formatMoney(product.price)}</div>
            <p class="text-muted">${product.desc || ""}</p>
            <div class="row">
              <div class="col-6">
                <b>Tồn kho</b>
                <p class="${product.stock <= 5 ? "text-danger fw-bold" : ""}">
                  ${product.stock <= 5 ? "🔥 Chỉ còn " : "Còn "}${product.stock} sản phẩm
                </p>
              </div>
              <div class="col-6">
                <b>Danh mục</b>
                <p>${product.category}</p>
              </div>
            </div>

            <label for="qty" class="mt-2">Số lượng</label>
            <div class="input-group mb-4" style="width:160px;">
              <button class="btn btn-outline-success qty-btn" id="qty-minus">-</button>
              <input id="qty" type="number" min="1" max="${product.stock}" class="form-control text-center" value="1">
              <button class="btn btn-outline-success qty-btn" id="qty-plus">+</button>
            </div>

            <div class="d-grid gap-2">
              <button class="btn btn-success btn-lg" id="btn-add-cart" ${product.stock<=0?"disabled":""}>
                <i class="fa-solid fa-cart-plus"></i> Thêm vào giỏ hàng
              </button>
              <button class="btn btn-warning btn-lg" id="btn-buy-now" ${product.stock<=0?"disabled":""}>⚡ Mua ngay</button>
              <button class="btn btn-outline-danger" id="btn-favorite"><i class="fa-solid fa-heart"></i> Yêu thích</button>
            </div>

            <div class="feature">
              <p>🚚 Miễn phí giao hàng từ 500.000đ</p>
              <p>🔄 Đổi trả trong 7 ngày</p>
              <p>🛡️ Cam kết hàng sạch chính hãng</p>
              <p>💳 Thanh toán bảo mật</p>
            </div>
          </div>
        </div>
      </div>

      <ul class="nav nav-tabs">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#description">Mô tả</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#review">Đánh giá</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#related">Sản phẩm liên quan</button></li>
      </ul>

      <div class="tab-content mt-4">
        <div class="tab-pane fade show active" id="description">
          <h4>🌿 Giới thiệu sản phẩm</h4>
          <p>${product.desc || ""}</p>
          <hr>
          <div class="row">
            <div class="col-md-6">
              <h5>Đặc điểm</h5>
              <ul>
                <li>🌱 Chứng nhận ${product.cert}</li>
                <li>🚫 Không chất bảo quản độc hại</li>
                <li>🥬 Thu hoạch / sản xuất trong ngày</li>
                <li>📦 Đóng gói thân thiện môi trường</li>
              </ul>
            </div>
            <div class="col-md-6">
              <h5>Thông số</h5>
              <table class="table">
                <tr><th>Danh mục</th><td>${product.category}</td></tr>
                <tr><th>Mã sản phẩm</th><td>${product.code || "—"}</td></tr>
                <tr><th>Chứng nhận</th><td>${product.cert}</td></tr>
                <tr><th>Tồn kho</th><td>${product.stock}</td></tr>
              </table>
            </div>
          </div>
        </div>

        <div class="tab-pane fade" id="review">
          <h4>⭐ Đánh giá khách hàng</h4>
          <hr>
          <div id="review-list"></div>
          <hr>
          <h5>Viết đánh giá</h5>
          <input id="reviewName" class="form-control mb-3" placeholder="Tên của bạn">
          <select id="reviewStar" class="form-select mb-3">
            <option value="5">★★★★★ (5 sao)</option>
            <option value="4">★★★★☆ (4 sao)</option>
            <option value="3">★★★☆☆ (3 sao)</option>
            <option value="2">★★☆☆☆ (2 sao)</option>
            <option value="1">★☆☆☆☆ (1 sao)</option>
          </select>
          <textarea id="reviewContent" class="form-control mb-3" rows="4" placeholder="Nhận xét..."></textarea>
          <button class="btn btn-success" id="btn-send-review">Gửi đánh giá</button>
        </div>

        <div class="tab-pane fade" id="related">
          <div class="row g-4" id="related-list"></div>
        </div>
      </div>
    `;

    bindEvents();
    loadReviews();
    loadRelated();
    updateCartBadge();
  }

  function bindEvents(){
    document.getElementById("qty-minus").addEventListener("click", () => changeQty(-1));
    document.getElementById("qty-plus").addEventListener("click", () => changeQty(1));
    document.getElementById("btn-add-cart").addEventListener("click", () => doAddToCart());
    document.getElementById("btn-buy-now").addEventListener("click", () => {
      doAddToCart();
      setTimeout(() => { window.location.href = "cart.html"; }, 500);
    });
    document.getElementById("btn-favorite").addEventListener("click", addFavorite);
    document.getElementById("btn-send-review").addEventListener("click", sendReview);
  }

  function changeQty(delta){
    const qtyInput = document.getElementById("qty");
    let n = (parseInt(qtyInput.value) || 1) + delta;
    if(n < 1) n = 1;
    if(n > product.stock) n = product.stock;
    qtyInput.value = n;
  }

  function doAddToCart(){
    const qty = parseInt(document.getElementById("qty").value) || 1;
    addToCart(product.id, qty);
    Swal.fire({ toast:true, position:"top-end", icon:"success", title:"Đã thêm vào giỏ hàng", timer:1500, showConfirmButton:false });
  }

  function addFavorite(){
    const favorites = getData("favorites");
    if(!favorites.find(f => f.id === product.id)){
      favorites.push(product);
      saveData("favorites", favorites);
    }
    Swal.fire({ icon:"success", title:"Đã thêm vào yêu thích" });
  }

  function loadReviews(){
    const reviews = getData("reviews").filter(r => r.productId === product.id);
    const list = document.getElementById("review-list");
    if(reviews.length === 0){
      list.innerHTML = `<p class="text-muted">Chưa có đánh giá nào cho sản phẩm này. Hãy là người đầu tiên!</p>`;
      return;
    }
    list.innerHTML = reviews.map(r => `
      <div class="card mb-3"><div class="card-body">
        <h6>${r.name} <span class="text-warning">${"★".repeat(Number(r.star))}</span></h6>
        <p class="mb-1">${r.content}</p>
        <small class="text-muted">${r.date}</small>
      </div></div>
    `).join("");
  }

  function sendReview(){
    const name = document.getElementById("reviewName").value.trim();
    const content = document.getElementById("reviewContent").value.trim();
    const star = document.getElementById("reviewStar").value;
    if(!name || !content){
      Swal.fire("Lỗi", "Vui lòng nhập đầy đủ thông tin.", "warning");
      return;
    }
    const reviews = getData("reviews");
    reviews.push({ productId: product.id, name, star, content, date: new Date().toLocaleDateString("vi-VN") });
    saveData("reviews", reviews);
    loadReviews();
    document.getElementById("reviewName").value = "";
    document.getElementById("reviewContent").value = "";
    Swal.fire({ icon:"success", title:"Cảm ơn bạn đã đánh giá!" });
  }

  function loadRelated(){
    const related = getData("products").filter(p => p.category === product.category && p.id !== product.id).slice(0,3);
    const list = document.getElementById("related-list");
    if(related.length === 0){
      list.innerHTML = `<p class="text-muted">Không có sản phẩm liên quan.</p>`;
      return;
    }
    list.innerHTML = related.map(p => `
      <div class="col-md-4">
        <div class="card shadow-sm related-card h-100">
          <img src="${p.image}" class="card-img-top">
          <div class="card-body d-flex flex-column">
            <h5>${p.name}</h5>
            <p class="text-success">${formatMoney(p.price)}</p>
            <a href="product.html?id=${p.id}" class="btn btn-success w-100 mt-auto">Xem sản phẩm</a>
          </div>
        </div>
      </div>
    `).join("");
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
