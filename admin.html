<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EcoShop Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
  body{ background:#f4f6f9; font-family:Arial,sans-serif; }
  .sidebar{ position:fixed; width:240px; height:100vh; background:#2e7d32; color:#fff; overflow-y:auto; }
  .sidebar h3{ text-align:center; padding:20px; border-bottom:1px solid rgba(255,255,255,.2); }
  .sidebar a{ display:block; color:#fff; text-decoration:none; padding:15px 20px; transition:.3s; cursor:pointer; }
  .sidebar a:hover, .sidebar a.active{ background:#43a047; }
  .main{ margin-left:240px; padding:25px; }
  .card-box{ background:#fff; border-radius:10px; padding:20px; box-shadow:0 3px 10px rgba(0,0,0,.08); }
  .stat{ border-left:5px solid #2e7d32; }
  .table img{ width:60px; height:60px; object-fit:cover; border-radius:8px; }
  .search-box{ max-width:350px; }
  canvas{ max-height:300px; }
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h3><i class="fa-solid fa-leaf"></i> EcoShop</h3>
  <a href="#dashboard-section"><i class="fa fa-chart-line"></i> Dashboard</a>
  <a href="#product-section"><i class="fa fa-box"></i> Sản phẩm</a>
  <a href="#order-section"><i class="fa fa-cart-shopping"></i> Đơn hàng</a>
  <a id="logout-link"><i class="fa fa-right-from-bracket"></i> Đăng xuất</a>
  <a href="index.html"><i class="fa fa-store"></i> Về cửa hàng</a>
</div>

<!-- Main -->
<div class="main">
  <h2 class="mb-4" id="dashboard-section"><i class="fa-solid fa-gauge-high"></i> Dashboard</h2>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="card-box stat">
        <h6>Sản phẩm</h6>
        <h2 id="totalProduct">0</h2>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card-box stat">
        <h6>Tổng giá trị kho</h6>
        <h2 id="totalMoney">0 đ</h2>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card-box stat">
        <h6>Đơn hàng</h6>
        <h2 id="totalOrders">0</h2>
      </div>
    </div>
  </div>

  <!-- Chart -->
  <div class="card-box mt-4">
    <h5 class="mb-3"><i class="fa fa-chart-column"></i> Thống kê giá bán theo sản phẩm</h5>
    <canvas id="chart"></canvas>
  </div>

  <!-- Search + Add -->
  <div class="d-flex justify-content-between align-items-center mt-4 mb-3" id="product-section">
    <div class="search-box">
      <input type="text" class="form-control" id="searchInput" placeholder="🔍 Tìm sản phẩm...">
    </div>
    <button class="btn btn-success" id="btn-open-add" data-bs-toggle="modal" data-bs-target="#productModal">
      <i class="fa fa-plus"></i> Thêm sản phẩm
    </button>
  </div>

  <!-- Table -->
  <div class="card-box">
    <table class="table table-hover align-middle">
      <thead class="table-success">
        <tr><th>Ảnh</th><th>Tên sản phẩm</th><th>Danh mục</th><th>Giá</th><th>Kho</th><th>Trạng thái</th><th width="140">Thao tác</th></tr>
      </thead>
      <tbody id="productTable"></tbody>
    </table>
  </div>

  <!-- Orders -->
  <div class="card-box mt-4" id="order-section">
    <h5 class="mb-3"><i class="fa fa-cart-shopping"></i> Đơn hàng gần đây</h5>
    <table class="table table-hover align-middle">
      <thead class="table-success">
        <tr><th>Mã đơn</th><th>Khách hàng</th><th>Ngày đặt</th><th>Sản phẩm</th><th>Tổng tiền</th><th width="180">Trạng thái</th><th width="150">Thao tác</th></tr>
      </thead>
      <tbody id="orderTable"></tbody>
    </table>
  </div>
</div>

<!-- Modal Thêm / Sửa sản phẩm -->
<div class="modal fade" id="productModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title"><i class="fa fa-box"></i> Thông tin sản phẩm</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="mb-3">
          <label class="form-label">Tên sản phẩm</label>
          <input type="text" id="name" class="form-control" placeholder="Nhập tên sản phẩm">
        </div>
        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label">Danh mục</label>
            <select id="category" class="form-select">
              <option>Rau</option>
              <option>Trái cây</option>
              <option>Thịt</option>
              <option>Hải sản</option>
              <option>Thực phẩm</option>
            </select>
          </div>
          <div class="col-6 mb-3">
            <label class="form-label">Chứng nhận</label>
            <input type="text" id="cert" class="form-control" placeholder="VietGAP, Organic, HACCP...">
          </div>
        </div>
        <div class="row">
          <div class="col-6 mb-3">
            <label class="form-label">Giá bán</label>
            <input type="number" id="price" class="form-control" placeholder="100000">
          </div>
          <div class="col-6 mb-3">
            <label class="form-label">Số lượng kho</label>
            <input type="number" id="stock" class="form-control" placeholder="50">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Mô tả</label>
          <textarea id="desc" class="form-control" rows="3" placeholder="Mô tả ngắn về sản phẩm..."></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label">Hình ảnh</label>
          <input type="file" id="image" class="form-control" accept="image/*">
        </div>
        <div class="text-center">
          <img id="preview" src="https://via.placeholder.com/120" style="width:120px;height:120px;border-radius:10px;object-fit:cover;">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
        <button class="btn btn-success" id="btn-save-product"><i class="fa fa-save"></i> Lưu sản phẩm</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
  /* app.js đã gọi protectAdminRoute() khi DOMContentLoaded, sẽ tự
     chuyển hướng về auth.html nếu chưa đăng nhập bằng tài khoản admin. */

  let imageData = "";
  let chart;
  const productModalEl = document.getElementById("productModal");
  const productModal = new bootstrap.Modal(productModalEl);

  document.getElementById("logout-link").addEventListener("click", logout);

  // Upload ảnh (chỉ MỘT nơi duy nhất xử lý, bản cũ bị lặp lại 2 lần)
  document.getElementById("image").addEventListener("change", function(){
    const file = this.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      imageData = e.target.result;
      document.getElementById("preview").src = imageData;
    };
    reader.readAsDataURL(file);
  });

  function renderTable(filterKey = ""){
    const products = getData("products");
    const key = filterKey.toLowerCase();
    const list = products.filter(p => p.name.toLowerCase().includes(key));

    const tbody = document.getElementById("productTable");
    if(list.length === 0){
      tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">Không tìm thấy sản phẩm phù hợp.</td></tr>`;
    }else{
      tbody.innerHTML = list.map(p => `
        <tr>
          <td><img src="${p.image || 'https://via.placeholder.com/60'}"></td>
          <td>${p.name}</td>
          <td>${p.category || "—"}</td>
          <td>${formatMoney(p.price)}</td>
          <td>${p.stock}</td>
          <td>${p.stock > 0 ? '<span class="badge bg-success">Còn hàng</span>' : '<span class="badge bg-danger">Hết hàng</span>'}</td>
          <td>
            <button class="btn btn-warning btn-sm" data-edit="${p.id}"><i class="fa fa-edit"></i></button>
            <button class="btn btn-danger btn-sm" data-del="${p.id}"><i class="fa fa-trash"></i></button>
          </td>
        </tr>
      `).join("");
      tbody.querySelectorAll("[data-edit]").forEach(b => b.addEventListener("click", () => editProduct(Number(b.dataset.edit))));
      tbody.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", () => deleteProduct(Number(b.dataset.del))));
    }

    updateStat(products);
  }

  document.getElementById("btn-open-add").addEventListener("click", clearForm);

  document.getElementById("btn-save-product").addEventListener("click", () => {
    const id = document.getElementById("editId").value;
    const name = document.getElementById("name").value.trim();
    const price = Number(document.getElementById("price").value);
    const stock = Number(document.getElementById("stock").value);

    if(!name || !price || price <= 0){
      Swal.fire("Thiếu thông tin", "Vui lòng nhập tên và giá bán hợp lệ.", "warning");
      return;
    }

    const products = getData("products");

    if(id === ""){
      products.push({
        id: nextProductId(),
        name,
        category: document.getElementById("category").value,
        cert: document.getElementById("cert").value.trim() || "Đang cập nhật",
        price,
        oldPrice: Math.round(price * 1.1),
        stock: isNaN(stock) ? 0 : stock,
        desc: document.getElementById("desc").value.trim(),
        code: "ECO" + String(nextProductId()).padStart(3, "0"),
        rating: 5,
        image: imageData || `https://picsum.photos/seed/eco${Date.now()}/600/500`
      });
    }else{
      const p = products.find(p => p.id === Number(id));
      if(p){
        p.name = name;
        p.category = document.getElementById("category").value;
        p.cert = document.getElementById("cert").value.trim() || p.cert;
        p.price = price;
        p.stock = isNaN(stock) ? p.stock : stock;
        p.desc = document.getElementById("desc").value.trim();
        if(imageData) p.image = imageData;
      }
    }

    saveData("products", products);
    productModal.hide();
    clearForm();
    renderTable(document.getElementById("searchInput").value);
    Swal.fire({ toast:true, position:"top-end", icon:"success", title:"Đã lưu sản phẩm", timer:1500, showConfirmButton:false });
  });

  function editProduct(id){
    const p = findProduct(id);
    if(!p) return;
    document.getElementById("editId").value = p.id;
    document.getElementById("name").value = p.name;
    document.getElementById("category").value = p.category || "Rau";
    document.getElementById("cert").value = p.cert || "";
    document.getElementById("price").value = p.price;
    document.getElementById("stock").value = p.stock;
    document.getElementById("desc").value = p.desc || "";
    document.getElementById("preview").src = p.image;
    imageData = "";
    productModal.show();
  }

  function deleteProduct(id){
    if(!confirm("Bạn có chắc muốn xóa sản phẩm này?")) return;
    let products = getData("products");
    products = products.filter(p => p.id !== id);
    saveData("products", products);
    renderTable(document.getElementById("searchInput").value);
  }

  function clearForm(){
    document.getElementById("editId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("category").value = "Rau";
    document.getElementById("cert").value = "";
    document.getElementById("price").value = "";
    document.getElementById("stock").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("image").value = "";
    document.getElementById("preview").src = "https://via.placeholder.com/120";
    imageData = "";
  }

  document.getElementById("searchInput").addEventListener("keyup", (e) => renderTable(e.target.value));

  function updateStat(products){
    document.getElementById("totalProduct").textContent = products.length;
    const total = products.reduce((sum,p) => sum + p.price * p.stock, 0);
    document.getElementById("totalMoney").textContent = formatMoney(total);
    document.getElementById("totalOrders").textContent = getData("orders").length;
    drawChart(products);
  }

  function drawChart(products){
    const ctx = document.getElementById("chart");
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
      type: "bar",
      data: {
        labels: products.map(p => p.name),
        datasets: [{ label: "Giá bán (đ)", data: products.map(p => p.price), backgroundColor: "#2e7d32" }]
      },
      options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } } }
    });
  }

  const ORDER_STATUS_BADGE = {
    "Chờ xử lý": "bg-warning text-dark",
    "Đang giao": "bg-info text-dark",
    "Hoàn thành": "bg-success",
    "Đã hủy": "bg-danger"
  };

  function renderOrders(){
    const orders = getData("orders");
    const tbody = document.getElementById("orderTable");
    if(orders.length === 0){
      tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">Chưa có đơn hàng nào.</td></tr>`;
      return;
    }
    tbody.innerHTML = orders.slice().reverse().map(o => {
      const itemsStr = (o.items || []).map(it => `${it.name} ×${it.quantity}`).join(", ");
      const badgeClass = ORDER_STATUS_BADGE[o.status] || "bg-secondary";

      let actions = "";
      if(o.status === "Chờ xử lý"){
        actions = `
          <button class="btn btn-info btn-sm text-white" data-ship="${o.id}" title="Giao hàng"><i class="fa fa-truck"></i> Giao hàng</button>
          <button class="btn btn-outline-danger btn-sm" data-cancel="${o.id}" title="Hủy đơn"><i class="fa fa-xmark"></i></button>`;
      }else if(o.status === "Đang giao"){
        actions = `
          <button class="btn btn-success btn-sm" data-complete="${o.id}" title="Hoàn thành"><i class="fa fa-check"></i> Hoàn thành</button>
          <button class="btn btn-outline-danger btn-sm" data-cancel="${o.id}" title="Hủy đơn"><i class="fa fa-xmark"></i></button>`;
      }else{
        actions = `<span class="text-muted">—</span>`;
      }

      return `
        <tr>
          <td>${o.id}</td>
          <td>${o.customer}</td>
          <td>${o.date}</td>
          <td style="max-width:220px;">${itemsStr}</td>
          <td>${formatMoney(o.total)}</td>
          <td><span class="badge ${badgeClass}">${o.status}</span></td>
          <td>${actions}</td>
        </tr>`;
    }).join("");

    tbody.querySelectorAll("[data-ship]").forEach(b => b.addEventListener("click", () => updateOrderStatus(b.dataset.ship, "Đang giao")));
    tbody.querySelectorAll("[data-complete]").forEach(b => b.addEventListener("click", () => updateOrderStatus(b.dataset.complete, "Hoàn thành")));
    tbody.querySelectorAll("[data-cancel]").forEach(b => b.addEventListener("click", () => updateOrderStatus(b.dataset.cancel, "Đã hủy", true)));
  }

  function updateOrderStatus(orderId, newStatus, needsConfirm = false){
    if(needsConfirm && !confirm("Bạn có chắc muốn hủy đơn hàng này?")) return;
    const orders = getData("orders");
    const order = orders.find(o => o.id === orderId);
    if(!order) return;
    order.status = newStatus;
    saveData("orders", orders);
    renderOrders();
    updateStat(getData("products"));
    Swal.fire({ toast:true, position:"top-end", icon:"success", title:`Đơn ${orderId}: ${newStatus}`, timer:1400, showConfirmButton:false });
  }

  renderTable();
  renderOrders();
</script>
</body>
</html>
