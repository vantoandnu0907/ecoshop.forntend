<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EcoShop | Giỏ hàng</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
  body{ background:#f5f7f8; font-family:Arial,Helvetica,sans-serif; }
  .navbar{ background:#2e7d32; }
  .navbar-brand{ font-weight:bold; font-size:24px; color:#fff!important; }
  .cart-card{ background:#fff; border-radius:15px; padding:20px; box-shadow:0 5px 15px rgba(0,0,0,.08); margin-bottom:20px; }
  .product-img{ width:80px; height:80px; object-fit:cover; border-radius:10px; }
  .qty-btn{ width:35px; height:35px; }
  .summary{ background:#fff; padding:25px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,.08); position:sticky; top:20px; }
  .price{ color:#2e7d32; font-weight:bold; }
  .progress{ height:12px; }
  .empty{ padding:70px; text-align:center; }
  .empty i{ font-size:70px; color:#bbb; margin-bottom:20px; }
  .table td{ vertical-align:middle; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">🌿 EcoShop</a>
  </div>
</nav>

<div class="container mt-4">
  <div class="row">
    <div class="col-lg-8">
      <div class="cart-card">
        <h3 class="mb-4"><i class="fa-solid fa-cart-shopping text-success"></i> Giỏ hàng của bạn</h3>
        <table class="table table-hover">
          <thead class="table-success">
            <tr><th>Ảnh</th><th>Sản phẩm</th><th>Giá</th><th>Số lượng</th><th>Tổng</th><th></th></tr>
          </thead>
          <tbody id="cartTable"></tbody>
        </table>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="summary">
        <h4>Tóm tắt đơn hàng</h4>
        <hr>
        <p>Số sản phẩm <span class="float-end" id="totalItem">0</span></p>
        <p>Tạm tính <span class="float-end" id="subtotal">0đ</span></p>
        <p>Phí vận chuyển <span class="float-end" id="shipFee">30.000đ</span></p>
        <hr>
        <h4>Tổng thanh toán <span class="float-end text-success" id="grandTotal">0đ</span></h4>
        <hr>
        <label class="mb-2">Mã giảm giá</label>
        <div class="input-group">
          <input id="coupon" class="form-control" placeholder="Ví dụ: ECO10">
          <button class="btn btn-success" id="btn-coupon">Áp dụng</button>
        </div>
        <div class="mt-4">
          <small>Mua thêm <b>500.000đ</b> để được miễn phí vận chuyển</small>
          <div class="progress mt-2"><div class="progress-bar bg-success" id="shipProgress" style="width:0%"></div></div>
        </div>
        <button class="btn btn-success w-100 mt-4" id="btn-checkout">
          <i class="fa-solid fa-credit-card"></i> Thanh toán
        </button>
        <button class="btn btn-outline-danger w-100 mt-2" id="btn-clear">
          <i class="fa fa-trash"></i> Xóa toàn bộ
        </button>
        <a href="index.html" class="btn btn-outline-success w-100 mt-2">Tiếp tục mua sắm</a>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  let discount = 0;

  function renderCart(){
    const cart = getData("cart");
    const table = document.getElementById("cartTable");
    table.innerHTML = "";
    let subtotal = 0;

    if(cart.length === 0){
      table.innerHTML = `
        <tr><td colspan="6">
          <div class="empty">
            <i class="fa-solid fa-cart-shopping"></i>
            <h3>Giỏ hàng đang trống</h3>
            <p class="text-muted">Hãy chọn những sản phẩm sạch yêu thích nhé!</p>
            <a href="index.html" class="btn btn-success">Tiếp tục mua sắm</a>
          </div>
        </td></tr>`;
      updateSummary(0);
      return;
    }

    cart.forEach((item, index) => {
      subtotal += item.price * item.quantity;
      table.innerHTML += `
        <tr>
          <td><img src="${item.image || 'https://via.placeholder.com/80'}" class="product-img"></td>
          <td><b>${item.name}</b><br><small class="text-muted">Sản phẩm sạch</small></td>
          <td class="price">${formatMoney(item.price)}</td>
          <td>
            <button class="btn btn-outline-success btn-sm qty-btn" data-decr="${index}">-</button>
            <span class="mx-2">${item.quantity}</span>
            <button class="btn btn-outline-success btn-sm qty-btn" data-incr="${index}">+</button>
          </td>
          <td class="price">${formatMoney(item.price * item.quantity)}</td>
          <td><button class="btn btn-danger btn-sm" data-remove="${index}"><i class="fa fa-trash"></i></button></td>
        </tr>`;
    });

    table.querySelectorAll("[data-incr]").forEach(b => b.addEventListener("click", () => changeQty(Number(b.dataset.incr), 1)));
    table.querySelectorAll("[data-decr]").forEach(b => b.addEventListener("click", () => changeQty(Number(b.dataset.decr), -1)));
    table.querySelectorAll("[data-remove]").forEach(b => b.addEventListener("click", () => removeItem(Number(b.dataset.remove))));

    updateSummary(subtotal);
  }

  function updateSummary(subtotal){
    const cart = getData("cart");
    document.getElementById("totalItem").textContent = cart.reduce((s,i)=>s+i.quantity,0);
    document.getElementById("subtotal").textContent = formatMoney(subtotal);

    let shipping = subtotal >= 500000 ? 0 : (subtotal > 0 ? 30000 : 0);
    document.getElementById("shipFee").textContent = formatMoney(shipping);

    let total = subtotal + shipping;
    if(discount > 0) total = total - total * discount;
    document.getElementById("grandTotal").textContent = formatMoney(Math.round(total));

    let percent = (subtotal / 500000) * 100;
    if(percent > 100) percent = 100;
    document.getElementById("shipProgress").style.width = percent + "%";
  }

  function changeQty(index, delta){
    const cart = getData("cart");
    cart[index].quantity += delta;
    if(cart[index].quantity < 1) cart[index].quantity = 1;
    saveData("cart", cart);
    updateCartBadge();
    renderCart();
  }

  function removeItem(index){
    if(!confirm("Bạn muốn xóa sản phẩm này?")) return;
    const cart = getData("cart");
    cart.splice(index, 1);
    saveData("cart", cart);
    updateCartBadge();
    renderCart();
  }

  document.getElementById("btn-clear").addEventListener("click", () => {
    if(!confirm("Xóa toàn bộ giỏ hàng?")) return;
    saveData("cart", []);
    updateCartBadge();
    renderCart();
  });

  document.getElementById("btn-coupon").addEventListener("click", () => {
    const code = document.getElementById("coupon").value.trim().toUpperCase();
    if(code === "ECO10"){ discount = 0.1; Swal.fire({icon:"success", title:"Áp dụng thành công", text:"Giảm 10%"}); }
    else if(code === "ECO20"){ discount = 0.2; Swal.fire({icon:"success", title:"Áp dụng thành công", text:"Giảm 20%"}); }
    else { discount = 0; Swal.fire({icon:"error", title:"Mã giảm giá không hợp lệ"}); }
    renderCart();
  });

  // "Thanh toán" trước đây không có tác dụng gì — nay tạo đơn hàng thật,
  // yêu cầu đăng nhập, rồi xóa giỏ hàng và điều hướng về trang chủ.
  document.getElementById("btn-checkout").addEventListener("click", () => {
    const cart = getData("cart");
    if(cart.length === 0){
      Swal.fire("Giỏ hàng trống", "Vui lòng thêm sản phẩm trước khi thanh toán.", "info");
      return;
    }
    const user = getCurrentUser();
    if(!user){
      Swal.fire({
        icon:"info", title:"Cần đăng nhập",
        text:"Vui lòng đăng nhập để hoàn tất thanh toán.",
        confirmButtonText:"Đăng nhập ngay"
      }).then(() => { location.href = "auth.html"; });
      return;
    }
    const orders = getData("orders");
    const total = cart.reduce((s,i)=>s+i.price*i.quantity, 0);
    orders.push({
      id: "DH" + Date.now(),
      customer: user.name,
      email: user.email,
      date: new Date().toISOString().slice(0,10),
      items: cart,
      total,
      status: "Chờ xử lý"
    });
    saveData("orders", orders);
    saveData("cart", []);
    updateCartBadge();
    Swal.fire({ icon:"success", title:"Đặt hàng thành công!", text:"Cảm ơn bạn đã mua sắm tại EcoShop." })
      .then(() => { location.href = "index.html"; });
  });

  renderCart();
</script>
</body>
</html>
