<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoShop - Đăng nhập</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
  body{ background:#e8f5e9; font-family:"Segoe UI",sans-serif; }
  .login-box{ max-width:420px; margin:50px auto; background:#fff; padding:35px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,.15); }
  .logo{ width:70px; display:block; margin:auto; }
  .title{ text-align:center; font-weight:bold; color:#2e7d32; margin-top:15px; margin-bottom:25px; }
  .btn-success{ background:#2e7d32; border:none; }
  .btn-success:hover{ background:#388e3c; }
  .nav-pills .nav-link.active{ background:#2e7d32; }
  .password{ position:relative; }
  .password i{ position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer; color:#666; }
</style>
</head>
<body>

<div class="container">
  <div class="login-box">
    <h1 class="logo" style="font-size:50px; text-align:center;">🌿</h1>
    <h3 class="title"><i class="fa-solid fa-leaf"></i> EcoShop</h3>

    <ul class="nav nav-pills nav-justified mb-4">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#login">Đăng nhập</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#register">Đăng ký</button></li>
    </ul>

    <div class="tab-content">
      <!-- LOGIN -->
      <div class="tab-pane fade show active" id="login">
        <input id="loginEmail" type="email" class="form-control mb-3" placeholder="Email">
        <div class="password mb-3">
          <input id="loginPass" type="password" class="form-control" placeholder="Mật khẩu">
          <i class="fa-solid fa-eye" data-toggle="loginPass"></i>
        </div>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="remember">
          <label class="form-check-label">Ghi nhớ đăng nhập</label>
        </div>
        <button class="btn btn-success w-100" id="btnLogin">Đăng nhập</button>
        <div class="text-center mt-3 text-muted">
          <small>Tài khoản quản trị mặc định: <b>admin@ecoshop.com</b> / <b>123456</b></small>
        </div>
        <div class="text-center mt-2">
          <button type="button" class="btn btn-link btn-sm text-danger" id="btnResetData">
            Không đăng nhập được? Đặt lại dữ liệu cửa hàng
          </button>
        </div>
      </div>

      <!-- REGISTER -->
      <div class="tab-pane fade" id="register">
        <input id="name" type="text" class="form-control mb-3" placeholder="Họ và tên">
        <input id="email" type="email" class="form-control mb-3" placeholder="Email">
        <div class="password mb-3">
          <input id="pass" type="password" class="form-control" placeholder="Mật khẩu">
          <i class="fa-solid fa-eye" data-toggle="pass"></i>
        </div>
        <div class="password mb-3">
          <input id="repass" type="password" class="form-control" placeholder="Nhập lại mật khẩu">
          <i class="fa-solid fa-eye" data-toggle="repass"></i>
        </div>
        <button class="btn btn-success w-100" id="btnRegister">Đăng ký</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
<script>
  // Việc seed tài khoản "users" giờ chỉ nằm trong app.js (initApp()),
  // tránh xung đột mật khẩu admin giữa các trang như bản cũ.

  document.querySelectorAll("[data-toggle]").forEach(icon => {
    icon.addEventListener("click", () => togglePassword(icon.dataset.toggle, icon));
  });
  function togglePassword(id, icon){
    const input = document.getElementById(id);
    if(input.type === "password"){
      input.type = "text";
      icon.classList.remove("fa-eye"); icon.classList.add("fa-eye-slash");
    }else{
      input.type = "password";
      icon.classList.remove("fa-eye-slash"); icon.classList.add("fa-eye");
    }
  }

  document.getElementById("btnRegister").addEventListener("click", () => {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("pass").value;
    const repass = document.getElementById("repass").value;

    if(!name || !email || !pass || !repass){
      return Swal.fire("Thông báo", "Vui lòng nhập đầy đủ thông tin.", "warning");
    }
    if(pass.length < 6){
      return Swal.fire("Lỗi", "Mật khẩu phải có ít nhất 6 ký tự.", "error");
    }
    if(pass !== repass){
      return Swal.fire("Lỗi", "Mật khẩu xác nhận không đúng.", "error");
    }

    const users = getData("users");
    if(users.some(u => u.email === email)){
      return Swal.fire("Lỗi", "Email đã tồn tại.", "error");
    }
    users.push({ name, email, pass, role: "customer" });
    saveData("users", users);

    Swal.fire("Thành công", "Đăng ký thành công, bạn có thể đăng nhập ngay.", "success");
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("pass").value = "";
    document.getElementById("repass").value = "";
  });

  document.getElementById("btnLogin").addEventListener("click", () => {
    const email = document.getElementById("loginEmail").value.trim();
    const pass = document.getElementById("loginPass").value;

    const users = getData("users");
    const user = users.find(u => u.email === email && u.pass === pass);

    if(!user){
      return Swal.fire("Lỗi", "Sai email hoặc mật khẩu.", "error");
    }

    saveData("currentUser", user);
    if(document.getElementById("remember").checked){
      localStorage.setItem("rememberEmail", email);
    }else{
      localStorage.removeItem("rememberEmail");
    }

    Swal.fire({ icon:"success", title:"Đăng nhập thành công", timer:1200, showConfirmButton:false })
      .then(() => {
        location.href = user.role === "admin" ? "admin.html" : "index.html";
      });
  });

  document.addEventListener("keydown", (e) => {
    if(e.key === "Enter") document.getElementById("btnLogin").click();
  });

  document.getElementById("btnResetData").addEventListener("click", () => {
    Swal.fire({
      icon: "warning",
      title: "Đặt lại toàn bộ dữ liệu?",
      text: "Thao tác này sẽ xóa sản phẩm, tài khoản, giỏ hàng và đơn hàng đã lưu trên trình duyệt này, rồi tạo lại dữ liệu mẫu ban đầu (bao gồm tài khoản admin mặc định).",
      showCancelButton: true,
      confirmButtonText: "Đặt lại",
      cancelButtonText: "Hủy",
      confirmButtonColor: "#c0392b"
    }).then((result) => {
      if(result.isConfirmed){
        resetAllData();
        Swal.fire("Đã đặt lại", "Dữ liệu đã được khôi phục về mặc định. Bạn có thể đăng nhập bằng admin@ecoshop.com / 123456.", "success")
          .then(() => location.reload());
      }
    });
  });

  window.addEventListener("load", () => {
    const email = localStorage.getItem("rememberEmail");
    if(email){
      document.getElementById("loginEmail").value = email;
      document.getElementById("remember").checked = true;
    }
  });
</script>
</body>
</html>
